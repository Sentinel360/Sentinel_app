name: capstone_final_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI
  google_fonts: ^8.0.1
  smooth_page_indicator: ^2.0.1
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.5

  # Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  flutter_polyline_points: ^2.1.0

  # Sensors
  sensors_plus: ^6.1.1
  google_sign_in: ^6.2.1

  #http
  http: ^1.2.0

  shared_preferences: ^2.2.2
  provider: ^6.1.1
  
  # Environment Variables
  flutter_dotenv: ^5.1.0

  flutter_blue_plus: ^1.35.3
  battery_plus: ^6.0.3




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
